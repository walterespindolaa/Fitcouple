<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitCouple">
<meta name="theme-color" content="#f2f2f7">
<title>FitCouple</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f7;--sur:#fff;--sur2:#f2f2f7;--sur3:#e5e5ea;
  --brd:#e5e5ea;--brd2:#d1d1d6;
  --t1:#000;--t2:#3c3c43cc;--t3:#3c3c4399;--t4:#3c3c4360;
  --w:#111;--wl:#f5f5f5;
  --g:#d63f6e;--gl:#fff0f5;--gm:#ffd6e8;
  --run:#ea580c;--rl:#fff7ed;
  --core:#7c3aed;--cl:#f5f3ff;
  --red:#ff3b30;--grn:#34c759;--ora:#ff9f0a;--blu:#007aff;
  --ring1:#ff2d55;--ring2:#a3e635;--ring3:#06b6d4;
  --r:14px;--rsm:10px;--rxs:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.08);
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:82px}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:300;background:rgba(242,242,247,.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--brd)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-img{width:30px;height:30px;border-radius:8px;object-fit:cover}
.logo-txt{font-size:18px;font-weight:900;letter-spacing:-.8px}
.logo-txt em{color:var(--g);font-style:normal}
.user-seg{display:flex;background:var(--sur3);border-radius:20px;padding:3px;gap:2px}
.usb{padding:5px 13px;border-radius:17px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--t3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s}
.usb.wa{background:var(--sur);color:var(--t1);box-shadow:var(--sh)}
.usb.ga{background:var(--g);color:#fff;box-shadow:0 2px 8px rgba(214,63,110,.3)}

/* accent */
.acc{height:2px;background:var(--w);transition:background .3s}
.acc.g{background:linear-gradient(90deg,var(--g),#f472b6)}

/* ── TABS ── */
.tabs{background:var(--sur);border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 6px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:0 10px;height:42px;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .18s;white-space:nowrap}
.tab.on{color:var(--t1);border-bottom-color:var(--t1)}
.tab.on.g{color:var(--g);border-bottom-color:var(--g)}
.tab svg{width:14px;height:14px;flex-shrink:0}

/* ── SCREENS ── */
.scr{display:none}
.scr.on{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── DASHBOARD ── */
.dash{padding:16px}

/* greeting */
.greet{margin-bottom:18px}
.greet-hi{font-size:22px;font-weight:800;letter-spacing:-.6px}
.greet-sub{font-size:13px;color:var(--t3);margin-top:2px}

/* rings card */
.rings-card{background:var(--sur);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;display:flex;align-items:center;gap:16px}
.rings-svg{width:90px;height:90px;flex-shrink:0}
.rings-info{flex:1}
.ring-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ring-row:last-child{margin-bottom:0}
.ring-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ring-label{font-size:12px;font-weight:600;color:var(--t2)}
.ring-val{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.ring-unit{font-size:11px;font-weight:500;color:var(--t3)}

/* quick stats */
.qstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.qsc{background:var(--sur);border-radius:var(--rsm);padding:12px 10px;box-shadow:var(--sh);text-align:center}
.qsc-val{font-size:22px;font-weight:900;letter-spacing:-.8px}
.qsc-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-top:2px}

/* today card */
.today-card{background:var(--sur);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tc-title{font-size:13px;font-weight:700;letter-spacing:-.1px}
.tc-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:var(--sur2);color:var(--t3)}
.tc-badge.done{background:#f0fdf4;color:#16a34a}
.tc-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--brd)}
.tc-row:last-child{border-bottom:none}
.tc-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--brd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s}
.tc-check.done{border-color:var(--grn);background:var(--grn)}
.tc-name{font-size:13px;font-weight:600;flex:1}
.tc-sets{font-size:11px;font-weight:600;color:var(--t3)}

/* calendar */
.cal-card{background:var(--sur);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:13px;font-weight:700}
.cal-nav{display:flex;gap:8px}
.cal-nav button{width:28px;height:28px;border-radius:50%;border:none;background:var(--sur2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t2)}
.cal-grid-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-dh{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;cursor:default;position:relative}
.cal-day span{font-size:11px;font-weight:600;color:var(--t2)}
.cal-day.today span{font-weight:800;color:var(--t1)}
.cal-day.today::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--blu)}
.cal-day.trained{background:var(--t1);border-radius:50%}
.cal-day.trained span{color:#fff}
.cal-day.trained.g{background:var(--g)}
.cal-day.rest-trained{background:var(--sur3)}
.cal-day.empty span{color:var(--t4)}

/* streak */
.streak-row{display:flex;gap:8px}
.streak-c{flex:1;background:var(--sur);border-radius:var(--rsm);padding:12px;box-shadow:var(--sh);text-align:center}
.streak-val{font-size:26px;font-weight:900;letter-spacing:-.8px}
.streak-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-top:2px}

/* ── WEEK STRIP ── */
.week{background:var(--sur);border-bottom:1px solid var(--brd);padding:10px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.week::-webkit-scrollbar{display:none}
.wday{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 9px;border-radius:var(--rsm);border:1.5px solid var(--brd);cursor:pointer;transition:all .18s;min-width:50px;background:var(--sur)}
.wda{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--t3);text-transform:uppercase}
.wdi{font-size:16px}
.wdt{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.2px;text-transform:uppercase;text-align:center;line-height:1.2;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wday.sel{border-color:var(--t1);background:var(--t1)}
.wday.sel .wda,.wday.sel .wdt{color:rgba(255,255,255,.5)}
.wday.sel .wdi-txt{color:#fff}
.wday.sel.gs{border-color:var(--g);background:var(--g)}
.wday.rest{opacity:.45}
.wday.rest.sel{opacity:1}
.wday.done-day{border-color:var(--grn)}
.wday.done-day .wda{color:var(--grn)}

/* prog bar */
.prog{display:flex;gap:3px;padding:8px 16px 0;background:var(--sur)}
.ps{flex:1;height:3px;border-radius:3px;background:var(--brd);transition:background .3s}
.ps.done{background:var(--t1)}
.ps.done.g{background:var(--g)}

/* stat bar */
.statbar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--brd);border-bottom:1px solid var(--brd)}
.sbc{background:var(--sur);padding:9px 8px;text-align:center}
.sbv{font-size:20px;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.sbv.g{color:var(--g)}
.sbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

/* ── MAIN ── */
.main{padding:0 16px}

/* day header */
.dhdr{padding:14px 0 10px;border-bottom:1px solid var(--brd);margin-bottom:12px}
.dlbl{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.dtitle{font-size:22px;font-weight:900;letter-spacing:-.7px;line-height:1.2}
.dsub{font-size:13px;color:var(--t2);margin-top:3px}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.1px}
.cd{background:var(--t1);color:#fff}
.cg{background:var(--gl);color:var(--g);border:1px solid var(--gm)}
.cgr{background:var(--sur2);color:var(--t2);border:1px solid var(--brd2)}
.cw{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.cr{background:var(--rl);color:#9a3412;border:1px solid #fed7aa}
.cc{background:var(--cl);color:#5b21b6;border:1px solid #ddd6fe}

/* finish button */
.finish-btn{width:100%;margin:14px 0 6px;padding:13px;border-radius:var(--r);border:none;font-size:15px;font-weight:800;font-family:'Inter',sans-serif;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--sur3);color:var(--t2)}
.finish-btn.active{background:var(--grn);color:#fff;box-shadow:0 4px 16px rgba(52,199,89,.35)}
.finish-btn.done-state{background:#f0fdf4;color:#16a34a;border:2px solid #86efac}
.finish-btn svg{width:18px;height:18px}

/* rest card */
.rest-card{margin:20px 0;border:1.5px dashed var(--brd2);border-radius:var(--r);padding:26px 20px;text-align:center;background:var(--sur)}
.ri{font-size:40px;margin-bottom:10px}
.rt{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.rs{font-size:13px;color:var(--t2);line-height:1.7}

/* section */
.sec{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--brd)}

/* exercise card */
.ec{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);transition:border-color .18s}
.ec.open{border-color:var(--t1);box-shadow:var(--shm)}
.ec.open.g{border-color:var(--g)}
.ec.ex-done{border-color:var(--grn)}

.eh{display:flex;align-items:flex-start;padding:12px 13px;cursor:pointer;gap:10px;user-select:none}
.enum{width:26px;height:26px;border-radius:8px;background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--t2);flex-shrink:0;margin-top:1px;transition:all .18s}
.enum.logged{background:var(--t1);color:#fff}
.enum.logged.g{background:var(--g)}
.ei{flex:1;min-width:0}
.en{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:4px;line-height:1.3}
.espec{display:flex;gap:5px;flex-wrap:wrap}
.espec span{font-size:11px;color:var(--t2);font-weight:600;background:var(--sur2);padding:2px 7px;border-radius:6px;white-space:nowrap}
.er{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.elkg{font-size:14px;font-weight:800;letter-spacing:-.3px}
.elkg.none{font-size:11px;font-weight:500;color:var(--t4)}
.elkg.g{color:var(--g)}
.tags{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:8px;font-weight:800;padding:2px 5px;border-radius:5px;letter-spacing:.4px;text-transform:uppercase}
.tdrop{background:#fee2e2;color:#991b1b}
.tuni{background:#e0f2fe;color:#075985}
.chev{font-size:10px;color:var(--t3);transition:transform .2s;margin-top:4px}
.ec.open .chev{transform:rotate(180deg)}

/* body */
.eb{display:none;padding:0 13px 13px;border-top:1px solid var(--brd)}
.ec.open .eb{display:block}
.tip{background:var(--sur2);border-radius:var(--rsm);padding:10px 12px;margin:10px 0;font-size:13px;color:var(--t2);line-height:1.65}
.tip strong{color:var(--t1);font-weight:700}
.ytbtn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--rxs);padding:6px 11px;text-decoration:none;margin-bottom:12px}

/* weight input */
.wlbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.wrow{display:flex;gap:7px;align-items:stretch}
.wwrap{flex:1;position:relative}
.wi{width:100%;border:1.5px solid var(--brd2);border-radius:var(--rxs);padding:10px 36px 10px 13px;font-size:18px;font-weight:800;color:var(--t1);font-family:'Inter',sans-serif;background:var(--sur);outline:none;-webkit-appearance:none;transition:border-color .2s}
.wi:focus{border-color:var(--t1)}
.wi:focus.gf{border-color:var(--g)}
.wu{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--t3);pointer-events:none}
.wsave{background:var(--t1);color:#fff;border:none;border-radius:var(--rxs);padding:10px 15px;font-size:13px;font-weight:800;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s}
.wsave:active{transform:scale(.97)}
.wsave.g{background:var(--g)}

/* weight history with chart */
.whist{margin-top:10px}
.wh-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.wh-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.wchip{font-size:11px;font-weight:700;background:var(--sur2);border:1px solid var(--brd);border-radius:6px;padding:3px 8px;color:var(--t2);display:flex;gap:4px;align-items:center}
.wchip .wd{font-size:9px;color:var(--t3);font-weight:500}
.wchip.pr{background:#f0fdf4;border-color:#86efac;color:#166534}
.mini-chart{height:40px;display:flex;align-items:flex-end;gap:3px}
.mc-bar{flex:1;border-radius:3px 3px 0 0;background:var(--brd);position:relative;transition:background .2s;min-height:4px;cursor:default}
.mc-bar.fill{background:var(--t1)}
.mc-bar.fill.g{background:var(--g)}
.mc-bar::after{content:attr(data-kg);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--t3);white-space:nowrap}

/* ── STATS ── */
.swrap{padding:16px}
.stit{font-size:12px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin:18px 0 10px}
.stit:first-child{margin-top:0}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);padding:13px;box-shadow:var(--sh)}
.mc.wide{grid-column:1/-1}
.mclbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.mcval{font-size:28px;font-weight:900;letter-spacing:-.8px}
.mcval.g{color:var(--g)}
.mcsub{font-size:11px;color:var(--t2);margin-top:2px}
.prlist{display:flex;flex-direction:column;gap:6px}
.prrow{display:flex;align-items:center;justify-content:space-between;background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--rsm);padding:11px 12px;box-shadow:var(--sh)}
.prname{font-size:13px;font-weight:700}
.prdate{font-size:10px;color:var(--t3);margin-top:1px}
.prw{font-size:18px;font-weight:900;letter-spacing:-.5px}
.prw.g{color:var(--g)}

/* ── RUNNING / CORE (shared) ── */
.hero{padding:18px 16px 16px;color:#fff}
.hero.rh{background:linear-gradient(135deg,#ea580c,#dc2626)}
.hero.ch{background:linear-gradient(135deg,#7c3aed,#4f46e5)}
.hero h2{font-size:21px;font-weight:900;letter-spacing:-.6px;margin-bottom:4px}
.hero p{font-size:13px;opacity:.88;line-height:1.55}
.stabs{background:var(--sur);border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:0 14px;height:42px;display:flex;align-items:center;font-size:12px;font-weight:700;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;font-family:'Inter',sans-serif;transition:all .18s;white-space:nowrap}
.stab.on.run{color:var(--run);border-bottom-color:var(--run)}
.stab.on.core{color:var(--core);border-bottom-color:var(--core)}
.rcont{padding:14px 16px 0}

/* zone / run cards */
.zcard{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)}
.zh{display:flex;align-items:center;gap:11px;padding:13px;cursor:pointer}
.zbar{width:4px;height:42px;border-radius:3px;flex-shrink:0}
.zn{font-size:14px;font-weight:800;letter-spacing:-.2px}
.zr{font-size:12px;color:var(--t2);font-weight:600;margin-top:2px}
.zb{display:none;padding:0 13px 13px;border-top:1px solid var(--brd)}
.zcard.open .zb{display:block}
.zdesc{font-size:13px;color:var(--t2);line-height:1.65;margin-top:10px}
.zfeel{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.zfp{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--sur2);color:var(--t2)}
.zhow{margin-top:10px;font-size:13px;line-height:1.65;padding:10px 12px;background:var(--sur2);border-radius:var(--rsm);color:var(--t2)}
.zhow strong{color:var(--t1);font-weight:700}

.rwcard{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)}
.rwh{padding:13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.rwt{font-size:14px;font-weight:800;letter-spacing:-.2px}
.rws{font-size:12px;color:var(--t2);margin-top:2px}
.rwbadge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:10px;background:var(--run);color:#fff;white-space:nowrap}
.rwbody{display:none;border-top:1px solid var(--brd)}
.rwcard.open .rwbody{display:block}
.rwday{display:flex;gap:10px;padding:10px 13px;border-bottom:1px solid var(--brd);align-items:flex-start}
.rwday:last-child{border-bottom:none}
.rdn{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);min-width:32px;padding-top:2px}
.rdinfo{flex:1}
.rdm{font-size:13px;font-weight:700;margin-bottom:2px}
.rdd{font-size:12px;color:var(--t2);line-height:1.5}
.mt{display:inline-flex;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;margin-right:4px;letter-spacing:.3px}
.mtc{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.mti{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.mtl{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.mtm{background:var(--cl);color:#5b21b6;border:1px solid #ddd6fe}
.mtr{background:var(--sur2);color:var(--t3);border:1px solid var(--brd)}

/* core cards */
.ccard{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)}
.cch{display:flex;align-items:center;gap:10px;padding:13px;cursor:pointer}
.cicn{width:36px;height:36px;border-radius:10px;background:var(--cl);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ccn{font-size:14px;font-weight:700;letter-spacing:-.2px}
.ccs{font-size:11px;color:var(--t2);font-weight:600;margin-top:2px}
.ccb{display:none;padding:0 13px 13px;border-top:1px solid var(--brd)}
.ccard.open .ccb{display:block}

/* ── PROFILE ── */
.pwrap{padding:14px 16px}
.psect{font-size:12px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin:18px 0 10px}
.psect:first-child{margin-top:4px}
.upick{display:flex;gap:8px;margin-bottom:4px}
.upbtn{flex:1;border:2px solid var(--brd);border-radius:var(--r);padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .18s;background:var(--sur);box-shadow:var(--sh)}
.upav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900}
.upav.w{background:#111;color:#fff}
.upav.g{background:var(--gl);color:var(--g)}
.upname{font-size:14px;font-weight:800}
.uprole{font-size:11px;color:var(--t3)}
.upbtn.ws{border-color:#111}
.upbtn.gs{border-color:var(--g);background:var(--gl)}

.pcard{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:10px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;border-bottom:1px solid var(--brd)}
.prow:last-child{border-bottom:none}
.pk{font-size:13px;color:var(--t2)}
.pv{font-size:14px;font-weight:800}
.pv.g{color:var(--g)}

.fi{margin-bottom:10px}
.flbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:block}
.finp{width:100%;border:1.5px solid var(--brd2);border-radius:var(--rxs);padding:10px 13px;font-size:14px;font-family:'Inter',sans-serif;color:var(--t1);background:var(--sur);outline:none;-webkit-appearance:none;transition:border-color .2s}
.finp:focus{border-color:var(--t1)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dbtn{width:100%;border:1.5px solid #fecaca;border-radius:var(--rsm);padding:13px;font-size:13px;font-weight:700;color:var(--red);background:#fef2f2;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}
.info-box{font-size:12px;color:var(--t3);line-height:1.6;padding:12px;background:var(--sur2);border-radius:var(--rsm)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(255,255,255,.95);backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--brd);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0;border:none;background:none;color:var(--t4);font-family:'Inter',sans-serif;transition:color .18s}
.nb svg{width:24px;height:24px}
.nb .nl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.nb.on{color:var(--t1)}
.nb.on.g{color:var(--g)}

/* toast */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--t1);color:#fff;font-size:13px;font-weight:700;padding:8px 18px;border-radius:20px;z-index:999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:var(--shm)}
.toast.g{background:var(--g)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

/* ════════════════════ STATE & STORE ════════════════════ */
let user='w',curDay=new Date().getDay(),curTab='dash',runTab='zones',coreTab='reto';
let calMonth=new Date();
if(curDay===0)curDay=6;else curDay--;

function st(){try{return JSON.parse(localStorage.getItem('fc3_'+user)||'{}')}catch{return{}}}
function sv(d){localStorage.setItem('fc3_'+user,JSON.stringify(d))}
function saveW(id,kg){
  const s=st();if(!s.w)s.w={};if(!s.w[id])s.w[id]=[];
  const today=new Date().toISOString().slice(0,10);
  s.w[id]=s.w[id].filter(x=>x.d!==today);
  s.w[id].unshift({kg:parseFloat(kg),d:today});
  if(s.w[id].length>8)s.w[id]=s.w[id].slice(0,8);
  sv(s);
}
function getW(id){const s=st();return(s.w&&s.w[id])||[]}
function getLastW(id){const h=getW(id);return h.length?h[0]:null}
function isG(){return user==='g'}

function markDayDone(dayIdx){
  const s=st();if(!s.done)s.done={};
  const k=new Date().toISOString().slice(0,10)+'_'+dayIdx;
  s.done[k]=1;sv(s);
}
function isDayDone(dayIdx,dateStr){
  const s=st();if(!s.done)return false;
  const k=(dateStr||new Date().toISOString().slice(0,10))+'_'+dayIdx;
  return!!s.done[k];
}
function getMonthActivity(year,month){
  const s=st();if(!s.done)return{};
  const prefix=`${year}-${String(month+1).padStart(2,'0')}`;
  const days={};
  Object.keys(s.done).forEach(k=>{if(k.startsWith(prefix)){const d=k.slice(8,10);days[d]=1;}});
  return days;
}

/* ════════════════════ SWITCH USER ════════════════════ */
function switchUser(u){
  user=u;
  document.getElementById('ub-w').className='usb'+(u==='w'?' wa':'');
  document.getElementById('ub-g').className='usb'+(u==='g'?' ga':'');
  document.getElementById('acc').className='acc'+(u==='g'?' g':'');
  updateNavColors();
  if(curTab==='dash')renderDash();
  else if(curTab==='workout'){renderWeek();renderDay(curDay);}
  else if(curTab==='stats')renderStats();
  else if(curTab==='profile')renderProfile();
  showToast(u==='w'?'👋 Walter':'💜 Gabriela');
}

function updateNavColors(){
  const tabs=['dash','workout','stats','running','profile'];
  tabs.forEach(t=>{
    const tab=document.querySelector(`.tab[data-t="${t}"]`);
    const nb=document.getElementById('nb-'+t);
    if(tab){
      if(tab.classList.contains('on'))tab.className='tab on'+(isG()?' g':'');
    }
    if(nb){
      if(nb.classList.contains('on'))nb.className='nb on'+(isG()?' g':'');
    }
  });
}

/* ════════════════════ SHOW TAB ════════════════════ */
function showTab(t){
  curTab=t;
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById('scr-'+t).classList.add('on');
  document.querySelectorAll('.tab').forEach(b=>b.className='tab'+(b.dataset.t===t?' on'+(isG()?' g':''):''));
  document.querySelectorAll('.nb').forEach(b=>{
    const tid=b.id.replace('nb-','');
    b.className='nb'+(tid===t?' on'+(isG()?' g':''):'');
  });
  if(t==='dash')renderDash();
  else if(t==='workout'){renderWeek();renderDay(curDay);}
  else if(t==='stats')renderStats();
  else if(t==='running')renderRunContent();
  else if(t==='core')renderCoreContent();
  else if(t==='profile')renderProfile();
}

      </div>
      ${day?.rest?`<div style="font-size:13px;color:var(--t3);padding:8px 0">${day.restMsg?.split('\n')[0]||'Dia de descanso.'}</div>`:todayRows+(todayEx.length>4?`<div style="font-size:12px;color:var(--t3);margin-top:8px;text-align:center">+ ${todayEx.length-4} exercícios</div>`:'')}
      ${!day?.rest?`<button class="finish-btn${todayLogged.length>0?' active':''} ${todayDone?'done-state':''}" onclick="finishToday(${todayIdx})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        ${todayDone?'Treino concluído!':'Finalizar treino do dia'}
      </button>`:''}
    </div>

    ${renderCalendar()}

    <div class="streak-row">
      <div class="streak-c"><div class="streak-val" style="color:${g?'var(--g)':'var(--t1)'}">${streak}</div><div class="streak-lbl">Dias seguidos</div></div>
      <div class="streak-c"><div class="streak-val" style="color:${g?'var(--g)':'var(--t1)'}">${totalDone}</div><div class="streak-lbl">Total treinos</div></div>
      <div class="streak-c"><div class="streak-val" style="color:${g?'var(--g)':'var(--t1)'}">${loggedEx}</div><div class="streak-lbl">Exerc. logados</div></div>
    </div>
    <div style="height:6px"></div>`;
}

function finishToday(dayIdx){
  if(isDayDone(dayIdx)){showToast('Treino já foi concluído hoje!');return;}
  markDayDone(dayIdx);
  renderDash();
  renderWeek();
  showToast('🎉 Treino concluído!');
}

function renderCalendar(){
  const g=isG();
  const year=calMonth.getFullYear();
  const month=calMonth.getMonth();
  const monthName=calMonth.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const activity=getMonthActivity(year,month);
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const offset=firstDay===0?6:firstDay-1;

  let cells='';
  for(let i=0;i<offset;i++)cells+=`<div class="cal-day empty"><span></span></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isTrained=activity[String(d).padStart(2,'0')];
    cells+=`<div class="cal-day${isToday?' today':''}${isTrained?' trained'+(g?' g':''):''}"><span>${d}</span></div>`;
  }

  return`<div class="cal-card">
    <div class="cal-header">
      <div class="cal-title">${monthName.charAt(0).toUpperCase()+monthName.slice(1)}</div>
      <div class="cal-nav">
        <button onclick="navCal(-1)">‹</button>
        <button onclick="navCal(1)">›</button>
      </div>
    </div>
    <div class="cal-grid-hdr">
      ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

function navCal(dir){
  calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+dir,1);
  renderDash();
}

/* ════════════════════ WORKOUT ════════════════════ */
function days(){return isG()?G_DAYS:W_DAYS}

function renderWeek(){
  const el=document.getElementById('week');
  const todayStr=new Date().toISOString().slice(0,10);
  el.innerHTML=days().map((d,i)=>{
    const done=isDayDone(i,todayStr);
    return`<div class="wday${d.rest?' rest':''}${done?' done-day':''}${i===curDay?' sel'+(isG()?' gs':''):''}" onclick="selDay(${i})">
      <span class="wda">${d.abbr}</span>
      <span class="wdi" style="font-size:16px">${d.ico}</span>
      <span class="wdt">${d.tag}</span>
    </div>`;
  }).join('');
}

function selDay(i){curDay=i;renderWeek();renderDay(i)}

function renderDay(idx){
  const day=days()[idx];
  const allEx=day.rest?[]:(day.secs||[]).flatMap(s=>s.exs);
  const logged=allEx.filter(e=>getLastW(e.id)).length;
  const totalS=allEx.reduce((a,e)=>a+e.s,0);

  const pg=document.getElementById('prog');
  pg.innerHTML=allEx.map(e=>`<div class="ps${getLastW(e.id)?' done'+(isG()?' g':''):''}"></div>`).join('');

  const sb=document.getElementById('statbar');
  if(day.rest||allEx.length===0){sb.innerHTML='';return;}
  sb.innerHTML=`
    <div class="sbc"><div class="sbv${isG()?' g':''}">${allEx.length}</div><div class="sbl">Exercícios</div></div>
    <div class="sbc"><div class="sbv${isG()?' g':''}">${totalS}</div><div class="sbl">Séries</div></div>
    <div class="sbc"><div class="sbv${isG()?' g':''}">${logged}/${allEx.length}</div><div class="sbl">Registrados</div></div>`;

  const m=document.getElementById('workout-main');
  const chips=(day.chips||[]).map(c=>`<span class="chip ${c.c}">${c.t}</span>`).join('');
  const todayStr=new Date().toISOString().slice(0,10);
  const isDone=isDayDone(idx,todayStr);
  const isToday=idx===(new Date().getDay()===0?6:new Date().getDay()-1);

  if(day.rest){
    m.innerHTML=`<div class="dhdr"><div class="dlbl">${day.lbl}</div><div class="dtitle">${day.title}</div><div class="dsub">${day.sub}</div><div class="chips">${chips}</div></div><div class="rest-card"><div class="ri">${day.ico}</div><div class="rt">${day.title}</div><div class="rs">${day.restMsg.replace(/\n/g,'<br>')}</div></div>`;
    return;
  }

  let html=`<div class="dhdr"><div class="dlbl">${day.lbl}</div><div class="dtitle">${day.title}</div><div class="dsub">${day.sub}</div><div class="chips">${chips}</div></div>`;

  (day.secs||[]).forEach(sec=>{
    html+=`<div class="sec">${sec.lbl}</div>`;
    sec.exs.forEach((ex,i)=>{
      const last=getLastW(ex.id);
      const hist=getW(ex.id);
      const tags=[ex.drop?'<span class="tag tdrop">DROP</span>':'',ex.uni?'<span class="tag tuni">UNILATERAL</span>':''].join('');
      const histHtml=hist.length?hist.slice(0,5).map((h,hi)=>`<div class="wchip${hi===0&&hist.length>1&&h.kg>hist[1].kg?' pr':''}">${h.kg}kg<span class="wd">${h.d.slice(5)}</span></div>`).join(''):`<div class="wchip" style="color:var(--t4)">sem registro</div>`;
      // mini chart
      const chartVals=hist.slice(0,5).reverse();
      const maxKg=chartVals.length?Math.max(...chartVals.map(x=>x.kg)):0;
      const chartHtml=chartVals.length>1?`<div class="mini-chart">${chartVals.map(h=>{const pct=maxKg?Math.round(h.kg/maxKg*100):10;return`<div class="mc-bar fill${isG()?' g':''}" style="height:${pct}%" data-kg="${h.kg}kg"></div>`;}).join('')}</div>`:'';
      html+=`
      <div class="ec${last?' ex-done':''}" id="ec-${ex.id}">
        <div class="eh" onclick="togEx('${ex.id}')">
          <div class="enum${last?' logged'+(isG()?' g':''):''}">${String(i+1).padStart(2,'0')}</div>
          <div class="ei">
            <div class="en">${ex.n}</div>
            <div class="espec"><span>${ex.s} séries</span><span>${ex.r} reps</span><span>${ex.rest}</span></div>
          </div>
          <div class="er">
            ${last?`<div class="elkg${isG()?' g':''}">${last.kg}kg</div>`:`<div class="elkg none">—</div>`}
            <div class="tags">${tags}</div>
            <div class="chev">▼</div>
          </div>
        </div>
        <div class="eb">
          <div class="tip">${ex.tip}</div>
          <a class="ytbtn" href="${ex.yt}" target="_blank">▶ Ver no YouTube</a>
          <div class="wlbl">Registrar peso de hoje</div>
          <div class="wrow">
            <div class="wwrap">
              <input class="wi${isG()?' gf':''}" type="number" id="wi-${ex.id}" placeholder="0.0" min="0" max="400" step="0.5" inputmode="decimal">
              <span class="wu">kg</span>
            </div>
            <button class="wsave${isG()?' g':''}" onclick="logW('${ex.id}',${idx})">Salvar</button>
          </div>
          <div class="whist">
            <div class="wh-lbl">Histórico de carga</div>
            <div class="wh-chips">${histHtml}</div>
            ${chartHtml}
          </div>
        </div>
      </div>`;
    });
  });

  if(isToday){
    html+=`<button class="finish-btn${logged>0?' active':''} ${isDone?'done-state':''}" onclick="finishDay(${idx})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      ${isDone?'✓ Treino concluído!':'Finalizar e registrar treino'}
    </button>`;
  }

  m.innerHTML=html;
}

function togEx(id){
  const c=document.getElementById('ec-'+id);
  const was=c.classList.contains('open');
  document.querySelectorAll('.ec.open').forEach(e=>e.classList.remove('open'));
  if(!was){c.classList.add('open');setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'nearest'}),80)}
}

function logW(id,dayIdx){
  const inp=document.getElementById('wi-'+id);
  const v=parseFloat(inp.value);
  if(!v||v<=0){showToast('⚠️ Digite um peso válido');return}
  saveW(id,v);
  showToast('✅ '+v+'kg registrado!');
  inp.value='';
  renderDay(curDay);
  setTimeout(()=>{const c=document.getElementById('ec-'+id);if(c)c.classList.add('open')},60);
}

function finishDay(dayIdx){
  if(isDayDone(dayIdx)){showToast('Treino já concluído hoje!');return;}
  markDayDone(dayIdx);
  renderDay(curDay);renderWeek();
  showToast('🎉 Treino concluído!');
}

/* ════════════════════ STATS ════════════════════ */
function renderStats(){
  const store=st();
  const weights=store.w||{};
  const allEx=days().flatMap(d=>(d.secs||[]).flatMap(s=>s.exs||[]));
  const prs=[];let totalLogs=0;
  allEx.forEach(ex=>{
    const h=weights[ex.id]||[];
    if(h.length){totalLogs+=h.length;const mx=Math.max(...h.map(x=>x.kg));prs.push({n:ex.n,w:mx,d:h.find(x=>x.kg===mx)?.d,cnt:h.length});}
  });
  prs.sort((a,b)=>b.w-a.w);
  const g=isG();
  const totalDone=Object.keys(store.done||{}).length;
  document.getElementById('stats-main').innerHTML=`
    <div class="stit">Resumo</div>
    <div class="mgrid">
      <div class="mc"><div class="mclbl">Exercícios logados</div><div class="mcval${g?' g':''}">${prs.length}</div><div class="mcsub">de ${allEx.length} no programa</div></div>
      <div class="mc"><div class="mclbl">Treinos concluídos</div><div class="mcval${g?' g':''}">${totalDone}</div><div class="mcsub">dias finalizados</div></div>
      <div class="mc"><div class="mclbl">Registros totais</div><div class="mcval${g?' g':''}">${totalLogs}</div><div class="mcsub">pesos salvos</div></div>
      <div class="mc"><div class="mclbl">Maior carga</div><div class="mcval${g?' g':''}">${prs[0]?prs[0].w+'kg':'—'}</div><div class="mcsub">${prs[0]?.n||'Nenhum registro'}</div></div>
    </div>
    <div class="stit">Recordes pessoais (PRs)</div>
    <div class="prlist">${prs.length?prs.slice(0,20).map(p=>`<div class="prrow"><div><div class="prname">${p.n}</div><div class="prdate">${p.d||'—'} · ${p.cnt} registro${p.cnt>1?'s':''}</div></div><div class="prw${g?' g':''}">${p.w}kg</div></div>`).join(''):'<div style="color:var(--t3);font-size:14px;padding:24px;text-align:center">Registre seus pesos no treino para ver os PRs aqui</div>'}</div>`;
}

/* ════════════════════ RUNNING ════════════════════ */
function showRunTab(t,btn){
  runTab=t;
  document.querySelectorAll('#run-tabs .stab').forEach(b=>b.classList.remove('on','run'));
  btn.classList.add('on','run');
  renderRunContent();
}
function renderRunContent(){
  const el=document.getElementById('run-content');
  if(runTab==='zones'){
    el.innerHTML=RUN_ZONES.map((z,i)=>`<div class="zcard" id="zc-${i}"><div class="zh" onclick="togG('zc-${i}')"><div class="zbar" style="background:${z.color}"></div><div style="flex:1"><div class="zn">${z.n}</div><div class="zr">${z.pct} · ${z.fc}</div></div><div class="chev">▼</div></div><div class="zb"><div class="zdesc">${z.desc}</div><div class="zfeel">${z.feel.map(f=>`<span class="zfp">${f}</span>`).join('')}</div><div class="zhow">${z.how}</div></div></div>`).join('');
  }else if(runTab==='5k'){
    el.innerHTML='<div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--run);margin-bottom:12px">Programa 5K · 12 semanas · Iniciante → Corredor</div>'+RUN_5K.map((w,i)=>`<div class="rwcard" id="rw5-${i}"><div class="rwh" onclick="togG('rw5-${i}')"><div><div class="rwt">${w.w}</div><div class="rws">${w.sub}</div></div><span class="rwbadge">${w.km}</span></div><div class="rwbody">${w.days.map(d=>`<div class="rwday"><div class="rdn">${d.d}</div><div class="rdinfo"><div class="rdm"><span class="mt ${d.m}">${d.method}</span></div><div class="rdd">${d.det}</div></div></div>`).join('')}</div></div>`).join('');
  }else if(runTab==='10k'){
    el.innerHTML='<div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--run);margin-bottom:12px">Programa 10K · 12 semanas · Corredor → Competidor</div>'+RUN_10K.map((w,i)=>`<div class="rwcard" id="rw10-${i}"><div class="rwh" onclick="togG('rw10-${i}')"><div><div class="rwt">${w.w}</div><div class="rws">${w.sub}</div></div><span class="rwbadge">${w.km}</span></div><div class="rwbody">${w.days.map(d=>`<div class="rwday"><div class="rdn">${d.d}</div><div class="rdinfo"><div class="rdm"><span class="mt ${d.m}">${d.method}</span></div><div class="rdd">${d.det}</div></div></div>`).join('')}</div></div>`).join('');
  }else{
    el.innerHTML=RUN_METHODS.map((m,i)=>`<div class="rwcard" id="rm-${i}"><div class="rwh" onclick="togG('rm-${i}')"><div><div class="rwt">${m.ico} ${m.n}</div><div class="rws">${m.sub}</div></div><div class="chev">▼</div></div><div class="rwbody" style="padding:13px"><div style="font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:10px">${m.tip}</div>${m.dets.map(d=>`<div style="display:flex;gap:8px;margin-bottom:5px;font-size:13px"><span style="color:var(--run)">›</span><span style="color:var(--t2)">${d}</span></div>`).join('')}</div></div>`).join('');
  }
}

/* ════════════════════ CORE ════════════════════ */
function showCoreTab(t,btn){
  coreTab=t;
  document.querySelectorAll('#core-tabs .stab').forEach(b=>b.classList.remove('on','core'));
  btn.classList.add('on','core');
  renderCoreContent();
}
function renderCoreContent(){
  const el=document.getElementById('core-content');
  const data=CORE_DATA[coreTab]||[];
  el.innerHTML=data.map((ex,i)=>`<div class="ccard" id="cc-${coreTab}-${i}"><div class="cch" onclick="togC('cc-${coreTab}-${i}')"><div class="cicn">${ex.ico}</div><div style="flex:1"><div class="ccn">${ex.n}</div><div class="ccs">${ex.spec}</div></div><div class="chev">▼</div></div><div class="ccb"><div class="tip" style="margin-top:10px;white-space:pre-line">${ex.tip}</div><div style="margin-top:8px;font-size:12px;color:var(--core);font-weight:700">📈 ${ex.prog}</div><a class="ytbtn" href="${ex.yt}" target="_blank" style="margin-top:10px">▶ Ver no YouTube</a></div></div>`).join('');
}

/* ════════════════════ GENERIC TOGGLE ════════════════════ */
function togG(id){
  const c=document.getElementById(id);if(!c)return;
  const was=c.classList.contains('open');
  c.parentElement.querySelectorAll('.zcard.open,.rwcard.open,.ccard.open').forEach(e=>e.classList.remove('open'));
  if(!was){c.classList.add('open');setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'nearest'}),80);}
}
function togC(id){
  const c=document.getElementById(id);if(!c)return;
  const was=c.classList.contains('open');
  document.querySelectorAll('.ccard.open').forEach(e=>e.classList.remove('open'));
  if(!was){c.classList.add('open');setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'nearest'}),80);}
}

/* ════════════════════ PROFILE ════════════════════ */
function renderProfile(){
  const s=st();
  const p=s.profile||{};
  const g=isG();
  const name=g?'Gabriela':'Walter';
  document.getElementById('profile-main').innerHTML=`
    <div class="psect">Usuário ativo</div>
    <div class="upick">
      <button class="upbtn${user==='w'?' ws':''}" onclick="switchUser('w')">
        <div class="upav w">W</div><div class="upname">Walter</div><div class="uprole">6 dias/sem · Futebol</div>
      </button>
      <button class="upbtn${user==='g'?' gs':''}" onclick="switchUser('g')">
        <div class="upav g">G</div><div class="upname">Gabriela</div><div class="uprole">Wellness · Glúteo</div>
      </button>
    </div>

    <div class="psect">Dados — ${name}</div>
    <div class="frow2">
      <div class="fi"><label class="flbl">Peso atual (kg)</label><input class="finp" id="fp-peso" type="number" placeholder="Ex: 83" value="${p.peso||''}" oninput="saveProfile()"></div>
      <div class="fi"><label class="flbl">Altura (cm)</label><input class="finp" id="fp-altura" type="number" placeholder="Ex: 170" value="${p.altura||''}" oninput="saveProfile()"></div>
    </div>
    <div class="frow2">
      <div class="fi"><label class="flbl">Idade</label><input class="finp" id="fp-idade" type="number" placeholder="Ex: 29" value="${p.idade||''}" oninput="saveProfile()"></div>
      <div class="fi"><label class="flbl">% Gordura (est.)</label><input class="finp" id="fp-gord" type="number" placeholder="Ex: 18" value="${p.gord||''}" oninput="saveProfile()"></div>
    </div>
    <div class="fi"><label class="flbl">Objetivo / meta</label><input class="finp" id="fp-meta" placeholder="Ex: Secar a pochete até junho" value="${p.meta||''}" oninput="saveProfile()"></div>
    <div class="fi"><label class="flbl">Protocolo de jejum</label><input class="finp" id="fp-jejum" placeholder="Ex: OMAD / 18:6" value="${p.jejum||''}" oninput="saveProfile()"></div>

    ${p.peso&&p.altura?`<div class="pcard">
      <div class="prow"><span class="pk">IMC</span><span class="pv${g?' g':''}">${(parseFloat(p.peso)/(Math.pow(parseFloat(p.altura)/100,2))).toFixed(1)}</span></div>
      <div class="prow"><span class="pk">Peso ideal (aprox.)</span><span class="pv${g?' g':''}">${Math.round(22.5*Math.pow(parseFloat(p.altura)/100,2))} kg</span></div>
    </div>`:''}

    <div class="psect">Resumo do Programa</div>
    <div class="pcard">
      <div class="prow"><span class="pk">Treinos / semana</span><span class="pv${g?' g':''}">${g?'6':'6 + futebol'}</span></div>
      <div class="prow"><span class="pk">Foco</span><span class="pv${g?' g':''}">${g?'Glúteo · Ombro · Wellness':'V-Shape · Definição'}</span></div>
      <div class="prow"><span class="pk">Cardio</span><span class="pv${g?' g':''}">${g?'Opcional':'Bike · Corrida · Futebol'}</span></div>
    </div>

    <div class="psect">Dados</div>
    <button class="dbtn" onclick="clearData()">Limpar histórico de ${name}</button>
    <div style="height:10px"></div>
    <div class="info-box">
      <strong>💡 Adicionar à tela inicial:</strong> No Safari (iPhone) toque em Compartilhar → "Adicionar à Tela de Início". No Chrome (Android) toque nos 3 pontos → "Adicionar à tela inicial". O app funcionará como um app nativo.
    </div>
    <div style="height:6px"></div>`;
}

function saveProfile(){
  const s=st();
  s.profile={
    peso:document.getElementById('fp-peso')?.value||'',
    altura:document.getElementById('fp-altura')?.value||'',
    idade:document.getElementById('fp-idade')?.value||'',
    gord:document.getElementById('fp-gord')?.value||'',
    meta:document.getElementById('fp-meta')?.value||'',
    jejum:document.getElementById('fp-jejum')?.value||'',
  };
  sv(s);
  // re-render only stats part if weight changed
}

function clearData(){
  if(confirm('Apagar todo o histórico de '+(isG()?'Gabriela':'Walter')+'?')){
    localStorage.removeItem('fc3_'+user);
    renderDash();renderStats();renderProfile();
    showToast('Histórico apagado');
  }
}

/* ════════════════════ TOAST ════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.className='toast'+(isG()?' g':'');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

/* ════════════════════ INIT ════════════════════ */
renderDash();
renderRunContent();
renderCoreContent();
</script>
</body>
</html>
